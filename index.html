<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAudioRack — Eurorack de Web Audio API</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WebAudioRack" />
  <link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/rack.css" />
  <link rel="stylesheet" href="css/module-themes.css" />
  <link rel="stylesheet" href="css/sprint1.css" />
  <link rel="stylesheet" href="css/page-transition.css" />
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar__brand"><span class="dot"></span>Web<span>Audio</span>Rack</div>
      <div class="add-wrap">
        <button id="addBtn" class="btn">+ Añadir módulo <kbd>↵</kbd></button>
      </div>
      <div class="toolbar__actions">
        <button id="btnSave" class="btn" title="Guardar patch en el navegador (Ctrl+S)">GUARDAR</button>
        <button id="btnLoad" class="btn" title="Cargar el patch guardado">CARGAR</button>
        <button id="btnExport" class="btn" title="Exportar a archivo .wapatch">EXPORT</button>
        <button id="btnImport" class="btn" title="Importar un archivo .wapatch">IMPORT</button>
        <span class="toolbar__div"></span>
        <button id="btnUndo" class="btn ico" title="Deshacer (Ctrl+Z)">↶</button>
        <button id="btnRedo" class="btn ico" title="Rehacer (Ctrl+Shift+Z)">↷</button>
        <input id="importFile" type="file" accept=".wapatch,application/json,.json" hidden />
      </div>
      <div class="tension-ctrl">
        <span class="tiny-label">TENSIÓN</span>
        <input id="tension" class="slider" type="range" min="0" max="100" value="30" />
      </div>
      <div class="cable-ctrl">
        <button id="cableBtn" class="btn">CABLE ▾</button>
        <div id="cableMenu" class="cable-menu">
          <div class="cable-menu__head">Cajón de cables</div>
          <div id="cableList" class="cable-list"></div>
          <div class="cable-menu__row">
            <input id="cablePick" class="swatch-pick" type="color" value="#36d39a" title="Color personalizado" />
            <span class="tiny-label">Personalizado</span>
            <button id="applyAll" class="btn">Pintar todos</button>
          </div>
        </div>
      </div>
      <button id="smoothBtn" class="btn" title="Movimiento suave del lienzo on/off">SUAVE: OFF</button>
      <div class="toolbar__spacer"></div>

      <div class="hud" id="hud">
        <div class="hud-stat" title="Carga estimada del hilo de UI (frame time / 16.7 ms). El navegador no expone CPU/GPU reales.">
          <span class="hud-stat__lbl">CPU</span>
          <span class="hud-stat__val" id="hudCpu">—</span>
        </div>
        <div class="hud-stat" title="Frecuencia de muestreo del AudioContext">
          <span class="hud-stat__lbl">SR</span>
          <span class="hud-stat__val" id="hudSR">—</span>
        </div>
        <div class="hud-stat" title="Latencia de salida (base + output) reportada por Web Audio">
          <span class="hud-stat__lbl">LAT</span>
          <span class="hud-stat__val" id="hudLat">—</span>
        </div>
        <div class="hud-stat" title="Reloj del AudioContext (segundos). Solo avanza si el motor está procesando.">
          <span class="hud-stat__lbl">CLK</span>
          <span class="hud-stat__val" id="hudClock">—</span>
        </div>
      </div>

      <button id="power" class="power">○ OFF</button>
    </div>

    <div class="rack">
      <div id="gridLayer" class="grid-layer"></div>
      <div id="surface" class="rack-surface">
        <svg id="cables" class="cable-layer"></svg>
      </div>
      <div id="zoomBar" class="zoom-bar" title="Zoom del lienzo">
        <div class="zoom-bar__lbl">ZOOM</div>
        <div id="zoomValue" class="zoom-bar__value">100%</div>
        <div id="zoomTrack" class="zoom-bar__track">
          <div id="zoomFill" class="zoom-bar__fill"></div>
          <div id="zoomThumb" class="zoom-bar__thumb"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- panel de selección de módulos (nivel de página, por encima de los cables) -->
  <div id="addBackdrop" class="add-backdrop"></div>
  <div id="addMenu" class="add-menu"></div>

  <!-- core -->
  <script src="js/core/engine.js"></script>
  <script src="js/core/patch.js"></script>
  <script src="js/core/layout.js"></script>
  <script src="js/core/viewport.js"></script>
  <script src="js/core/icons.js"></script>
  <script src="js/core/module.js"></script>
  <script src="js/core/rack.js"></script>
  <script src="js/core/tooltips.js"></script>
  <script src="js/core/themes.js"></script>
  <!-- sprint 1: persistencia, historial, menú contextual, UI -->
  <script src="js/core/ui.js"></script>
  <script src="js/core/history.js"></script>
  <script src="js/core/contextmenu.js"></script>
  <script src="js/core/persistence.js"></script>
  <script src="js/core/selection.js"></script>
  <script src="js/core/minimap.js"></script>
  <!-- módulos -->
  <script src="js/modules/sources.js"></script>
  <script src="js/modules/processors.js"></script>
  <script src="js/modules/mixers.js"></script>
  <script src="js/modules/io.js"></script>
  <script src="js/modules/advanced.js"></script>
  <script src="js/modules/utility.js"></script>
  <!-- app -->
  <script src="js/main.js"></script>

  <!-- PWA: registro del service worker (necesario para "Instalar app") -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (err) {
          console.warn("SW no registrado:", err);
        });
      });
    }
  </script>
</body>
</html>
