<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAudioRack — Eurorack de Web Audio API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/rack.css" />
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar__brand"><span class="dot"></span>Web<span>Audio</span>Rack</div>
      <div class="add-wrap">
        <button id="addBtn" class="btn">+ Añadir módulo <kbd>↵</kbd></button>
      </div>
      <div class="tension-ctrl">
        <span class="tiny-label">TENSIÓN</span>
        <input id="tension" class="slider" type="range" min="0" max="100" value="30" />
      </div>
      <div class="cable-ctrl">
        <button id="cableBtn" class="btn">CABLE <span id="cableDot" class="cable-dot"></span> ▾</button>
        <div id="cableMenu" class="cable-menu">
          <div class="cable-menu__head">Cajón de cables</div>
          <div id="cableList" class="cable-list"></div>
          <div class="cable-menu__row">
            <input id="cablePick" class="swatch-pick" type="color" value="#36d39a" title="Color personalizado" />
            <span class="tiny-label">Personalizado</span>
            <button id="applyAll" class="btn">Pintar todos</button>
          </div>
        </div>
      </div>
      <button id="smoothBtn" class="btn" title="Movimiento suave del lienzo on/off">SUAVE: OFF</button>
      <div class="toolbar__spacer"></div>
      <div id="status" class="toolbar__status"></div>
      <button id="power" class="power">○ OFF</button>
    </div>

    <div class="perf-panel" id="perfPanel">
      <div class="perf-stat" title="Estado del AudioContext">
        <span class="perf-stat__lbl">ESTADO</span>
        <span class="perf-stat__val"><span id="perfState" class="perf-pill">—</span></span>
      </div>
      <div class="perf-stat" title="Frecuencia de muestreo del AudioContext">
        <span class="perf-stat__lbl">SR</span>
        <span class="perf-stat__val" id="perfSR">—</span>
      </div>
      <div class="perf-stat" title="Latencia de salida reportada por la Web Audio API (base + output)">
        <span class="perf-stat__lbl">LATENCIA</span>
        <span class="perf-stat__val" id="perfLat">—</span>
      </div>
      <div class="perf-stat" title="Tiempo entre frames de la UI (objetivo aprox 16.7 ms a 60 fps)">
        <span class="perf-stat__lbl">FRAME</span>
        <span class="perf-stat__val" id="perfFrame">—</span>
      </div>
      <div class="perf-stat" title="Reloj del AudioContext en segundos. Avanza solo si el motor está procesando audio.">
        <span class="perf-stat__lbl">CLOCK</span>
        <span class="perf-stat__val" id="perfClock">—</span>
      </div>
      <div class="perf-stat" title="Módulos en el rack y cables conectados">
        <span class="perf-stat__lbl">GRAFO</span>
        <span class="perf-stat__val" id="perfGraph">—</span>
      </div>
      <div class="perf-meters" title="Nivel de salida master (L/R). Barra verde = RMS, marca blanca = pico.">
        <div class="perf-meters__lbl">OUT</div>
        <div class="perf-meters__rows">
          <div class="perf-meter">
            <span class="perf-meter__ch">L</span>
            <div class="perf-meter__bar"><div id="perfRmsL" class="perf-meter__rms"></div><div id="perfPkL" class="perf-meter__peak"></div></div>
            <span class="perf-meter__db" id="perfDbL">-inf</span>
          </div>
          <div class="perf-meter">
            <span class="perf-meter__ch">R</span>
            <div class="perf-meter__bar"><div id="perfRmsR" class="perf-meter__rms"></div><div id="perfPkR" class="perf-meter__peak"></div></div>
            <span class="perf-meter__db" id="perfDbR">-inf</span>
          </div>
        </div>
      </div>
      <div class="perf-spectrum" title="Espectro del master: qué frecuencias se están enviando al destino de audio.">
        <canvas id="perfSpec" width="280" height="44"></canvas>
      </div>
    </div>

    <div class="rack">
      <div id="gridLayer" class="grid-layer"></div>
      <div id="surface" class="rack-surface">
        <svg id="cables" class="cable-layer"></svg>
      </div>
      <div id="zoomBar" class="zoom-bar">
        <div id="zoomValue" class="zoom-bar__value">100%</div>
        <div id="zoomTrack" class="zoom-bar__track">
          <div id="zoomFill" class="zoom-bar__fill"></div>
          <div id="zoomThumb" class="zoom-bar__thumb"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- panel de selección de módulos (nivel de página, por encima de los cables) -->
  <div id="addBackdrop" class="add-backdrop"></div>
  <div id="addMenu" class="add-menu"></div>

  <!-- core -->
  <script src="js/core/engine.js"></script>
  <script src="js/core/patch.js"></script>
  <script src="js/core/layout.js"></script>
  <script src="js/core/viewport.js"></script>
  <script src="js/core/icons.js"></script>
  <script src="js/core/module.js"></script>
  <script src="js/core/rack.js"></script>
  <!-- módulos -->
  <script src="js/modules/sources.js"></script>
  <script src="js/modules/processors.js"></script>
  <script src="js/modules/mixers.js"></script>
  <script src="js/modules/io.js"></script>
  <script src="js/modules/advanced.js"></script>
  <!-- app -->
  <script src="js/main.js"></script>
</body>
</html>
